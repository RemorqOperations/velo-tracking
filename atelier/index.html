<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Atelier</title>

  <link rel="stylesheet" href="../assets/app.css">
  <script src="https://unpkg.com/html5-qrcode"></script>
</head>

<body>
  <div class="wrap">
    <header class="top">
      <div class="tiny">ATELIER</div>
      <button id="btnHistory" class="link">Historique</button>
    </header>

    <section class="card">
      <div class="label">Compteur aujourd’hui</div>
      <div id="counter" class="counter">0</div>
      <div id="status" class="status">—</div>
    </section>

    <section class="card">
      <div class="label">Utilisateur</div>
      <div class="row">
        <input id="login" class="input" placeholder="login" autocomplete="off"/>
        <input id="pin" class="input" placeholder="PIN" inputmode="numeric" type="password" />
      </div>
      <button id="btnSaveUser" class="btn secondary">Valider</button>
    </section>

    <section class="card">
      <div class="label">Problème</div>
      <div class="grid3">
        <button class="chip" data-prob="HS">HS</button>
        <button class="chip" data-prob="MANQUE_PIECES">Manque pièces</button>
        <button class="chip" data-prob="GROS_REPARATION">Grosse rep</button>
      </div>

      <div class="label" style="margin-top:10px;">Ou action</div>
      <div class="grid2">
        <button class="chip" data-action="ENTREE">Entrée</button>
        <button class="chip" data-action="SORTIE">Sortie</button>
      </div>

      <div id="choiceHint" class="status" style="margin-top:10px;">Choisir puis scanner</div>
    </section>

    <button id="btnScan" class="btn primary">SCANNER</button>

    <div id="scannerOverlay" class="overlay hidden">
      <div class="overlayTop">
        <div class="overlayTitle">Scanner…</div>
        <button id="btnClose" class="link">Fermer</button>
      </div>
      <div id="qr" class="qrbox"></div>
    </div>

    <div id="historyOverlay" class="overlay hidden">
      <div class="overlayTop">
        <div class="overlayTitle">Historique</div>
        <button id="btnCloseHistory" class="link">Fermer</button>
      </div>

      <div class="card">
        <div class="row">
          <input id="historyDate" class="input" type="date"/>
          <button id="btnLoadHistory" class="btn secondary">Voir</button>
        </div>
      </div>

      <div class="card">
        <div id="historyList" class="list"></div>
      </div>
    </div>
  </div>

  <script>
    window.APP_CONFIG = {
      apiUrl: "https://script.google.com/macros/s/AKfycbwLDylnd2iGCWS7ZcwMpelehJrPEP7ruL3ikWNqtGHPTwXiqVP5DBd9Rc2u6utBkQPiTA/exec",
      role: "RESPONSABLE_ATELIER",
      source: "web-atelier"
    };
  </script>
  <script src="../assets/atelier.js"></script>
</body>
</html>
